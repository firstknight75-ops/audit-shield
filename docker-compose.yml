version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: auditcore
      POSTGRES_USER: auditcore
      POSTGRES_PASSWORD: auditcore
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  backend:
    build: ./backend
    environment:
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-onpremise}
      DATABASE_URL: postgresql+asyncpg://auditcore:auditcore@postgres:5432/auditcore
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret
      COMPANY_MASTER_KEY: company-master-key
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: dev-token
    depends_on:
      - postgres
      - redis
    ports:
      - '8000:8000'
  frontend:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    ports:
      - '5173:5173'
    depends_on:
      - backend
  baileys-bridge:
    image: node:20-alpine
    working_dir: /srv
    command: sh -c "npm install && node server.js"
    volumes:
      - ./baileys-bridge:/srv
    ports:
      - '3001:3001'
volumes:
  pgdata:
