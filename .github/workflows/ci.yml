name: auditcore-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: ${{ github.workspace }}/backend

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: auditcore
          POSTGRES_PASSWORD: auditcore
          POSTGRES_DB: auditcore
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://auditcore:auditcore@localhost:5432/auditcore
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-prod
      COMPANY_MASTER_KEY: ci-company-master-key
      AUDITCORE_TEST_DATABASE_URL: postgresql+asyncpg://auditcore:auditcore@localhost:5432/auditcore
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Lint
        run: |
          pip install ruff==0.5.0
          ruff check backend/app
      - name: Migrate DB
        run: |
          cd backend && alembic upgrade head
      - name: Run tests
        run: |
          pytest backend/app/tests/ -q --tb=short --maxfail=10
      - name: No-external-AI guard
        run: bash scripts/check_no_external_ai.sh

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        if: github.event_name == 'push'
        with:
          path: ./

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci --prefer-offline --no-audit
      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: npm run build
      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

  audit-allowlist-guard:
    name: No-external-AI guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run no-external-AI guard
        run: bash scripts/check_no_external_ai.sh
